version: "0.1"

# preview_defaults are shared CLI preview artifact defaults, not source authoring requirements.
preview_defaults:
  dot:
    font_family: Public Sans
    # Keep SVG on a webfont for compact embedded output and PNG on a desktop font for Resvg.
    svg_font_asset: assets/fonts/PublicSans-Regular.woff
    png_font_asset: assets/fonts/PublicSans-Regular.otf
    dpi: 192

# normative_defaults describe the default semantic reading that projection/render tooling should explain or honor.
# They do not by themselves validate source files or alter compiled graph semantics.
# renderer_defaults are machine-readable downstream conventions for projection builders, render-model builders,
# and preview-style resolution. They may change derived projection data or render output, but not .sdd syntax.
views:
  - id: outcome_opportunity_map
    name: Outcome-Opportunity Map
    status: operational
    projection:
      include_node_types: [Outcome, Metric, Opportunity, Initiative]
      include_edge_types: [MEASURED_BY, SUPPORTS, ADDRESSES, IMPLEMENTED_BY, INSTRUMENTED_AT]
      hierarchy_edges: []
      ordering_edges: []
    conventions:
      normative_defaults:
        - id: include_edge_only_when_both_endpoints_included
          description: Edge is included only if both endpoints pass node-type filter.
      renderer_defaults:
        instrumentation_annotations:
          source_edge_type: INSTRUMENTED_AT
          render_mode: annotate_metric_when_target_out_of_scope
          group_order: [experience, event]
          experience_target_types: [Step, Place, ViewState]
          event_target_types: [Event]
          target_type_order: [Step, Place, ViewState, Event]
          display:
            include_target_id: true
            include_target_name_when_available: true
        profile_display:
          simple:
            show_instrumentation_annotations: false
          permissive:
            show_instrumentation_annotations: true
          recommended:
            show_instrumentation_annotations: true

  - id: journey_map
    name: Journey Map
    status: operational
    projection:
      include_node_types: [Stage, Step]
      include_edge_types: [CONTAINS, PRECEDES]
      hierarchy_edges: [CONTAINS]
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: stage_step_hierarchy
          description: Stage CONTAINS Step edges define hierarchy.
      renderer_defaults:
        reference_annotations:
          source_prop: opportunity_refs
          target_type: Opportunity
          render_mode: inline_step_badges
          sort: id_ascending
          unresolved_reference_policy: validate_in_profile
        profile_display:
          simple:
            show_reference_badges: false
          permissive:
            show_reference_badges: true
          recommended:
            show_reference_badges: true

  - id: service_blueprint
    name: Service Blueprint
    status: operational
    projection:
      include_node_types: [Step, Process, SystemAction, DataEntity, Policy]
      include_edge_types: [REALIZED_BY, DEPENDS_ON, READS, WRITES, CONSTRAINED_BY, PRECEDES]
      hierarchy_edges: []
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: process_sequence
          description: PRECEDES edges provide optional process ordering overlays.
      renderer_defaults:
        lane_mapping:
          lane_order: [customer, frontstage, backstage, support, system, policy]
          process_visibility_values: [frontstage, backstage, support]
          aliases:
            customer-visible: frontstage
            not-visible: backstage
          node_type_defaults:
            Step: customer
            Process: by_visibility
            SystemAction: system
            DataEntity: system
            Policy: policy
        profile_display:
          simple:
            show_secondary_edge_labels: false
          permissive:
            show_secondary_edge_labels: true
          recommended:
            show_secondary_edge_labels: true

  - id: ia_place_map
    name: IA Place Map
    status: operational
    projection:
      include_node_types: [Area, Place]
      include_edge_types: [CONTAINS, NAVIGATES_TO]
      hierarchy_edges: [CONTAINS]
      ordering_edges: []
    conventions:
      normative_defaults:
        - id: hierarchy_from_contains
          description: IA hierarchy is derived from CONTAINS.
        - id: source_order_place_chains
          description: At any rendered structural level, consecutive sibling Place nodes form an author-ordered lower-level place chain (siblings on the same lower level, not recursively lower) until a non-Place sibling boundary breaks the chain.
      renderer_defaults:
        node_annotations:
          subtitle_prop: route_or_key
          badge_prop: access
          metadata_props: [entry_points, primary_nav]
          access_examples: [public, auth, "role:<slug>"]
        profile_display:
          simple:
            show_place_route_or_key: false
            show_place_access: false
            show_place_entry_points: false
            show_place_primary_nav: true
          permissive:
            show_place_route_or_key: true
            show_place_access: true
            show_place_entry_points: true
            show_place_primary_nav: true
          recommended:
            show_place_route_or_key: true
            show_place_access: true
            show_place_entry_points: true
            show_place_primary_nav: true

  - id: scenario_flow
    name: Scenario Flow
    status: operational
    projection:
      include_node_types: [Step, Place, ViewState]
      include_edge_types: [PRECEDES, REALIZED_BY, NAVIGATES_TO, TRANSITIONS_TO]
      hierarchy_edges: []
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: step_ordering_primary
          description: PRECEDES on Step is the primary flow spine.
      renderer_defaults:
        decision_nodes:
          kind_prop: kind
          decision_value: decision
          branch_label_precedence: [guard, event, to_name]
          render_shape: diamond
        profile_display:
          simple:
            show_branch_labels: false
          permissive:
            show_branch_labels: true
          recommended:
            show_branch_labels: true

  - id: ui_contracts
    name: UI Contracts
    status: operational
    projection:
      include_node_types: [Place, ViewState, Component, State, Event, DataEntity, SystemAction]
      include_edge_types: [COMPOSED_OF, CONTAINS, TRANSITIONS_TO, EMITS, BINDS_TO, DEPENDS_ON]
      hierarchy_edges: [COMPOSED_OF, CONTAINS]
      ordering_edges: [TRANSITIONS_TO]
    conventions:
      normative_defaults:
        - id: ui_contract_scope
          description: Place and ViewState are containers for component and transition contracts.
      renderer_defaults:
        transition_graph_priority:
          primary: ViewState
          secondary: State
          secondary_grouping_prop: scope_id
          secondary_render_mode: inset
          fallback_to_secondary_when_primary_absent: true
        profile_display:
          simple:
            show_place_route_or_key: false
            show_place_access: false
            show_place_entry_points: false
            show_place_primary_nav: true
            show_view_state_data_required: false
            show_secondary_state_groups_when_primary_view_state: false
            show_supporting_contract_lane_when_primary_view_state: false
          permissive:
            show_place_route_or_key: true
            show_place_access: true
            show_place_entry_points: true
            show_place_primary_nav: true
            show_view_state_data_required: true
            show_secondary_state_groups_when_primary_view_state: true
            show_supporting_contract_lane_when_primary_view_state: true
          recommended:
            show_place_route_or_key: true
            show_place_access: true
            show_place_entry_points: true
            show_place_primary_nav: true
            show_view_state_data_required: true
            show_secondary_state_groups_when_primary_view_state: true
            show_supporting_contract_lane_when_primary_view_state: true
