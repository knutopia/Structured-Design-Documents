version: "0.1"

views:
  - id: outcome_opportunity_map
    name: Outcome-Opportunity Map
    status: operational
    projection:
      include_node_types: [Outcome, Metric, Opportunity, Initiative]
      include_edge_types: [MEASURED_BY, SUPPORTS, ADDRESSES, IMPLEMENTED_BY, INSTRUMENTED_AT]
      hierarchy_edges: []
      ordering_edges: []
    conventions:
      normative_defaults:
        - id: include_edge_only_when_both_endpoints_included
          description: Edge is included only if both endpoints pass node-type filter.
      renderer_defaults:
        instrumentation_annotations:
          source_edge_type: INSTRUMENTED_AT
          render_mode: annotate_metric_when_target_out_of_scope
          group_order: [experience, event]
          experience_target_types: [Step, Place, ViewState]
          event_target_types: [Event]
          target_type_order: [Step, Place, ViewState, Event]
          display:
            include_target_id: true
            include_target_name_when_available: true

  - id: journey_map
    name: Journey Map
    status: operational
    projection:
      include_node_types: [Stage, Step]
      include_edge_types: [CONTAINS, PRECEDES]
      hierarchy_edges: [CONTAINS]
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: stage_step_hierarchy
          description: Stage CONTAINS Step edges define hierarchy.
      renderer_defaults:
        reference_annotations:
          source_prop: opportunity_refs
          target_type: Opportunity
          render_mode: inline_step_badges
          sort: id_ascending
          unresolved_reference_policy: validate_in_profile

  - id: service_blueprint
    name: Service Blueprint
    status: operational
    projection:
      include_node_types: [Step, Process, SystemAction, DataEntity, Policy]
      include_edge_types: [REALIZED_BY, DEPENDS_ON, READS, WRITES, CONSTRAINED_BY, PRECEDES]
      hierarchy_edges: []
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: process_sequence
          description: PRECEDES edges provide optional process ordering overlays.
      renderer_defaults:
        lane_mapping:
          lane_order: [customer, frontstage, backstage, support, system, policy]
          process_visibility_values: [frontstage, backstage, support]
          aliases:
            customer-visible: frontstage
            not-visible: backstage
          node_type_defaults:
            Step: customer
            Process: by_visibility
            SystemAction: system
            DataEntity: system
            Policy: policy

  - id: ia_place_map
    name: IA Place Map
    status: operational
    projection:
      include_node_types: [Area, Place]
      include_edge_types: [CONTAINS, NAVIGATES_TO]
      hierarchy_edges: [CONTAINS]
      ordering_edges: []
    conventions:
      normative_defaults:
        - id: hierarchy_from_contains
          description: IA hierarchy is derived from CONTAINS.
      renderer_defaults:
        node_annotations:
          subtitle_prop: route_or_key
          badge_prop: access
          metadata_props: [entry_points, primary_nav]
          access_examples: [public, auth, "role:<slug>"]

  - id: scenario_flow
    name: Scenario Flow
    status: operational
    projection:
      include_node_types: [Step, Place, ViewState]
      include_edge_types: [PRECEDES, REALIZED_BY, NAVIGATES_TO, TRANSITIONS_TO]
      hierarchy_edges: []
      ordering_edges: [PRECEDES]
    conventions:
      normative_defaults:
        - id: step_ordering_primary
          description: PRECEDES on Step is the primary flow spine.
      renderer_defaults:
        decision_nodes:
          kind_prop: kind
          decision_value: decision
          branch_label_precedence: [guard, event, to_name]
          render_shape: diamond

  - id: ui_contracts
    name: UI Contracts
    status: operational
    projection:
      include_node_types: [Place, ViewState, Component, State, Event, DataEntity, SystemAction]
      include_edge_types: [COMPOSED_OF, CONTAINS, TRANSITIONS_TO, EMITS, BINDS_TO, DEPENDS_ON]
      hierarchy_edges: [COMPOSED_OF, CONTAINS]
      ordering_edges: [TRANSITIONS_TO]
    conventions:
      normative_defaults:
        - id: ui_contract_scope
          description: Place and ViewState are containers for component and transition contracts.
      renderer_defaults:
        transition_graph_priority:
          primary: ViewState
          secondary: State
          secondary_grouping_prop: scope_id
          secondary_render_mode: inset
          fallback_to_secondary_when_primary_absent: true
