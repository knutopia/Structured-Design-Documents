id: permissive
version: "0.1"
extends: core
intent: Validate structural correctness and contract compatibility with warning-first governance.
default_severity_mode: permissive

severity_defaults:
  structural: error
  endpoint_contracts: warn
  governance: warn

rules:
  - id: endpoint_pairs_enforced
    source: core/contracts.yaml
    applies_to: all_relationships
    severity: warn
  - id: transitions_event_reference
    source: core/contracts.yaml
    applies_to: TRANSITIONS_TO
    severity: warn
  - id: binds_to_requires_field
    source: core/contracts.yaml
    applies_to: BINDS_TO
    severity: error
  - id: outcome_has_metric
    source: core/contracts.yaml
    applies_to: MEASURED_BY
    severity: warn
  - id: initiative_addresses_opportunity
    source: core/contracts.yaml
    applies_to: ADDRESSES
    severity: warn
  - id: step_realization_required
    source: core/contracts.yaml
    applies_to: REALIZED_BY
    severity: warn
  - id: required_props_by_type
    source: profile
    severity: warn
    required_props:
      Outcome: [owner, description, time_horizon, scope, stakeholder]
      Metric: [owner, description, definition, source, cadence, metric_type]
      Opportunity: [owner, description, evidence, segment, severity]
      Initiative: [owner, description, non_goals, status]
      Stage: [owner, description, order_index]
      Step: [owner, description, actor, intent, success_criteria]
      Area: [owner, description, scope]
      Place: [owner, description, surface, route_or_key, access]
      ViewState: [owner, description, place_id, data_required]
      Component: [owner, description, responsibility, inputs, outputs]
      State: [owner, description, scope_id, invariants]
      Event: [owner, description, source_kind, payload_schema]
      Process: [owner, description, visibility, sla]
      SystemAction: [owner, description, system_name, action, failure_modes]
      DataEntity: [owner, description, fields, system_of_record]
      Policy: [owner, description, policy_owner, enforcement_point]
  - id: step_opportunity_refs_valid
    source: profile
    severity: warn
    applies_to: Step
    rule_logic:
      kind: delimited_node_references
      node_type: Step
      property: opportunity_refs
      delimiter: ","
      target_type: Opportunity
      id_pattern: '^OP-[0-9]{3,}([a-z][a-z0-9]*)?$'
  - id: process_visibility_enum
    source: profile
    severity: warn
    applies_to: Process
    rule_logic:
      kind: enum_property
      node_type: Process
      property: visibility
      allowed_values: [frontstage, backstage, support]
      accepted_aliases:
        customer-visible: frontstage
        not-visible: backstage
  - id: place_access_format
    source: profile
    severity: warn
    applies_to: Place
    rule_logic:
      kind: pattern_property
      node_type: Place
      property: access
      pattern: '^(public|auth|role:[a-z0-9_/-]+)$'
  - id: place_entry_points_format
    source: profile
    severity: warn
    applies_to: Place
    rule_logic:
      kind: delimited_key_value_property
      node_type: Place
      property: entry_points
      delimiter: ","
      entry_delimiter: ":"
      key_pattern: '^[a-z][a-z0-9_-]*$'
      value_pattern: '^.+$'
  - id: place_primary_nav_boolean_string
    source: profile
    severity: warn
    applies_to: Place
    rule_logic:
      kind: enum_property
      node_type: Place
      property: primary_nav
      allowed_values: ["true", "false"]
      optional: true
  - id: step_kind_enum
    source: profile
    severity: warn
    applies_to: Step
    rule_logic:
      kind: enum_property
      node_type: Step
      property: kind
      allowed_values: [decision]
      optional: true
  - id: branching_step_should_be_marked_decision
    source: profile
    severity: warn
    applies_to: PRECEDES
    rule_logic:
      kind: branching_step_marker
      node_type: Step
      relationship: PRECEDES
      marker_property: kind
      required_value: decision
  - id: state_scope_reference
    source: profile
    severity: warn
    applies_to: State
    rule_logic:
      kind: node_reference_property
      node_type: State
      property: scope_id
      allowed_target_types: [Place, Component]
  - id: id_prefix_type_coupling
    source: profile
    severity: warn
    prefix_map:
      Outcome: O
      Metric: M
      Opportunity: OP
      Initiative: I
      Stage: G
      Step: J
      Area: A
      Place: P
      ViewState: VS
      Component: C
      State: ST
      Event: E
      Process: PR
      SystemAction: SA
      DataEntity: D
      Policy: PL
  - id: viewstate_parentage_policy
    source: profile
    severity: warn
    authoritative_field: place_id
    requirement: contains_edge_or_derived_contains
