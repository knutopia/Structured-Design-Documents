bundle_name: sdd-text-spec-bundle
bundle_version: "0.1"
language: sdd-text
language_version: "0.1"

core:
  vocab: core/vocab.yaml
  syntax: core/syntax.yaml
  schema: core/schema.json
  contracts: core/contracts.yaml
  # Downstream projection normalization does not change .sdd authoring.
  projection_schema: core/projection_schema.json
  views: core/views.yaml

profiles:
  - id: simple
    path: profiles/simple.yaml
    intent: Low-noise drafting with strict structural validation.
    default_severity_mode: permissive
  - id: permissive
    path: profiles/permissive.yaml
    intent: Warning-first governance with strict structural validation.
    default_severity_mode: permissive
  - id: recommended
    path: profiles/recommended.yaml
    intent: Strict governance for production-ready authoring.
    default_severity_mode: strict

examples:
  - path: examples/outcome_to_ia_trace.sdd
    compiled_snapshot: snapshots/outcome_to_ia_trace.compiled.json
    projection_snapshots:
      - snapshots/outcome_to_ia_trace.outcome_opportunity_map.projection.json
      - snapshots/outcome_to_ia_trace.journey_map.projection.json
      - snapshots/outcome_to_ia_trace.ia_place_map.projection.json
  - path: examples/metric_event_instrumentation.sdd
    compiled_snapshot: snapshots/metric_event_instrumentation.compiled.json
    projection_snapshots:
      - snapshots/metric_event_instrumentation.outcome_opportunity_map.projection.json
  - path: examples/place_viewstate_transition.sdd
    compiled_snapshot: snapshots/place_viewstate_transition.compiled.json
    projection_snapshots:
      - snapshots/place_viewstate_transition.ui_contracts.projection.json
      - snapshots/place_viewstate_transition.ia_place_map.projection.json
  - path: examples/ui_state_fallback.sdd
    compiled_snapshot: snapshots/ui_state_fallback.compiled.json
    projection_snapshots:
      - snapshots/ui_state_fallback.ui_contracts.projection.json
  - path: examples/scenario_branching.sdd
    compiled_snapshot: snapshots/scenario_branching.compiled.json
    projection_snapshots:
      - snapshots/scenario_branching.scenario_flow.projection.json
  - path: examples/service_blueprint_slice.sdd
    compiled_snapshot: snapshots/service_blueprint_slice.compiled.json
    projection_snapshots:
      - snapshots/service_blueprint_slice.service_blueprint.projection.json
      - snapshots/service_blueprint_slice.journey_map.projection.json

compatibility:
  requires_compiler_min: "0.1.0"
  notes:
    - Core vocabulary is closed; non-canonical aliases are informative and must not be emitted by compilers.
    - Source-text parsing follows core/syntax.yaml; post-extraction tooling should treat it as the normative machine-readable parser contract for .sdd files.
    - Projection snapshots follow core/projection_schema.json; that schema governs downstream renderer outputs, not .sdd authoring.
    - Views provide operational projection definitions and renderer defaults; full spatial layout remains renderer-specific.
    - Post-extraction policy treats this bundle as machine-readable source of truth for tooling.
